<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 170" role="img" aria-label="PUCE">
  <!-- Recreación aproximada del logo PUCE (reemplazar por el oficial). -->
  <g>
    <!-- Compás / rosa de los vientos -->
    <g>
      <!-- Norte -->
      <polygon points="80,12 74,76 80,82" fill="#2AA9E0"/>
      <polygon points="80,12 86,76 80,82" fill="#1B4B9B"/>
      <!-- Sur -->
      <polygon points="80,150 74,86 80,82" fill="#1B4B9B"/>
      <polygon points="80,150 86,86 80,82" fill="#2AA9E0"/>
      <!-- Oeste -->
      <polygon points="14,81 74,75 80,81" fill="#2AA9E0"/>
      <polygon points="14,81 74,87 80,81" fill="#1B4B9B"/>
      <!-- Este -->
      <polygon points="146,81 86,75 80,81" fill="#1B4B9B"/>
      <polygon points="146,81 86,87 80,81" fill="#2AA9E0"/>
      <!-- Diagonales -->
      <polygon points="120,42 78,80 88,74" fill="#1877C9"/>
      <polygon points="40,42 82,80 72,74" fill="#1877C9"/>
      <polygon points="120,120 78,82 88,88" fill="#1877C9"/>
      <polygon points="40,120 82,82 72,88" fill="#1877C9"/>
      <circle cx="80" cy="81" r="7" fill="#16337A"/>
      <circle cx="80" cy="81" r="3" fill="#fff"/>
    </g>
    <!-- Wordmark -->
    <text x="182" y="118" font-family="Arial, Helvetica, sans-serif" font-size="104" font-weight="800" letter-spacing="2" fill="#16337A">PUCE</text>
  </g>
</svg>
